<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .heading{
            text-align: center;
            font-size: larger;
            transition: 0.3s;            
        }
       .heading:hover{
         color: yellow;
    text-shadow: 0 0 15px rgb(168, 16, 5);


       }
       .title{
        text-align: center;
        font-size: larger;
        color: white;
       }
       .explain{
        font-size:20px;
        transition: 0.3s;
       }
       .explain:hover{
           color: yellow;
    text-shadow: 0 0 15px rgb(168, 16, 5);
       }
       input{
        align-items: center;
        padding: 60px;
        font:size: 30px;
       }
    </style>
</head>
<body bgcolor="black">
    <div class="title">
   <p >Please move the cursor throughout the screen</p>
 </div>
    <div class="heading">
    <h1> practice basic css features and framework</h1>
    </div>
    <div class="explain">
        <p>
            As you move throughout the screen the colour <br>
            of the text changes from black to yellow or other colours<br>
            this is due to the hover transition and shadow elements if the css file.
        </p>
    </div>
    <div class="button">
        <p align="center">
        <input type="button" value="start" height="200" align="center" >
    </p>
    </div>
</body>
</html>
